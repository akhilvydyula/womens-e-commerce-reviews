# CI: tests, lint, dependency audit, and Bandit SAST.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pip-audit
      - name: Ruff lint
        continue-on-error: true
        run: |
          pip install ruff
          ruff check src || true
      - name: Python syntax check
        run: python -m compileall -q src

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc off

  sast-bandit:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bandit
        run: |
          pip install "bandit[toml]>=1.7.9"
          bandit -r src -c bandit.yaml --severity-level medium --confidence-level medium
