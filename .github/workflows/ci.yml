# CI/CD: tests + dependency vulnerabilities + Python SAST + secret scanning.
# Triggers on push/PR to default branches; adjust branches as needed.

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # for some code scanning upload APIs if you extend later

jobs:
  # --- Secret / credential leakage (API keys, tokens in git history) ---
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Known vulnerable dependencies (requirements files) ---
  pip-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: [requirements.txt, requirements_train.txt]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit ${{ matrix.file }}
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r "${{ matrix.file }}" --desc on

  # --- Python SAST / common security anti-patterns (Bandit) ---
  bandit:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install "bandit[toml]>=1.7.7"
      # -ll = report MEDIUM+ only (LOW includes subprocess warnings for fixed kaggle CLI).
      - name: Run bandit on src/
        run: bandit -r src -ll -f txt

  # --- Unit tests + coverage gate ---
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install & test
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          python -m coverage run -m unittest discover -s tests -p "test_*.py"
          python -m coverage report -m --fail-under=70
